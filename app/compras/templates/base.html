<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}doc2gen{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css" rel="stylesheet">
</head>

<body>
    <header>
        <div class="container-fluid h-100 d-flex align-items-center">
            <a href="https://www.usp.br"> 
            <img src="/static/img/usp-logo.png" alt="USP Logo" style="height: 60px; margin-right: 20px; padding: 10px">
            </a>
            <a href="https://www.usp.br"> 
            <img src="/static/img/usp-logo-texto.png" alt="USP Texto">
            </a>    
            
        </div>

        <div style="background: url('/static/img/bg-headtop.gif') repeat-x; height: 30px; position: relative;">
        </div>

    </header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">doc2gen</a>
            {% if user.is_authenticated %}

            <div class="d-flex justify-content-between align-items-center w-100">


                <div class="navbar-nav">
                    <a class="nav-link" href="{% url 'compra_list' %}">Compras</a>
                    <a class="nav-link" href="{% url 'contrato_list' %}">Contratos</a>
                    <a class="nav-link" href="{% url 'pessoa_list' %}">Pessoas</a>
                    <a class="nav-link" href="{% url 'organizacao_list' %}">Organizações</a>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <span class="navbar-text">
                        {{ user.username }}
                    </span>

                    <form action="{% url 'logout' %}" method="post" class="mb-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm d-flex align-items-center gap-1">
                            <i class="bi bi-door-open"></i>
                            <span>Sair</span>
                        </button>
                    </form>
                </div>


            </div>
            {% endif %}

        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
        <div class="row justify-content-center">
            <div class="col-lg-8">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/i18n/pt-BR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr('.data-brasileira', {
                locale: 'pt',
                dateFormat: 'Y-m-d',
                altInput: true,
                altFormat: 'd/m/Y',
            });
        });
    </script>
</body>

</html>

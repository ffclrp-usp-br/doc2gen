<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}doc2gen{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body>
    <a class="skip-link" href="#content">Ir para o conteúdo</a>

    <header class="app-header">
        <div class="container-fluid d-flex align-items-center">
            <a href="https://www.usp.br">
                 <img src="/static/img/usp-logo-f.png" alt="Logo USP">
            </a>
        </div>
    </header>
    <div class="app-header-strip"></div>

    <nav class="app-nav" aria-label="Navegação principal">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="/">doc2gen</a>

            {% if user.is_authenticated %}
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'compra_list' %}">
                    <i class="bi bi-cart3"></i> Compras
                </a>
                <a class="nav-link" href="{% url 'contrato_list' %}">
                    <i class="bi bi-file-earmark-text"></i> Contratos
                </a>
                <a class="nav-link" href="{% url 'pessoa_list' %}">
                    <i class="bi bi-people"></i> Pessoas
                </a>
                <a class="nav-link" href="{% url 'organizacao_list' %}">
                    <i class="bi bi-building"></i> Organizações
                </a>
            </div>

            <div class="nav-user">
                <span>{{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" class="mb-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-door-open"></i> Sair
                    </button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>

    <main id="content">
        <div class="container">
            {% if messages %}
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/i18n/pt-BR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr('.data-brasileira', {
                locale: 'pt',
                dateFormat: 'Y-m-d',
                altInput: true,
                altFormat: 'd/m/Y',
            });
        });
    </script>
</body>

</html>

{% extends 'base.html' %}

{% block title %}Confirmar Exclusão de Item{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header" style="background: var(--color-danger); color: var(--color-danger-text);">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Exclusão</h4>
            </div>
            <div class="card-body text-center py-4">
                <p class="mb-2">Tem certeza que deseja excluir o item <strong>{{ object.numero_ordem }}</strong>?</p>
                <p class="text-muted small mb-4">{{ object.descricao|truncatechars:100 }}</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'item_list' object.compra_id %}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Confirmar Exclusão
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

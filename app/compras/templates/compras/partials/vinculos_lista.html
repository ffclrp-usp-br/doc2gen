<div class="table-responsive">
    <table class="table table-hover mb-0">
        <thead>
            <tr>
                <th>Pessoa</th>
                <th>Cargo</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for vinculo in vinculos %}
            <tr data-vinculo-id="{{ vinculo.id }}">
                <td>{{ vinculo.pessoa.nome }}</td>
                <td>{{ vinculo.cargo }}</td>
                <td>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="excluirVinculo({{ vinculo.id }})" title="Excluir vínculo">
                        <i class="bi bi-trash"></i> Excluir
                    </button>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="empty-state">
                    <p>Nenhum responsável vinculado.</p>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="mt-4 pt-3 border-top">
    <h6 class="mb-3"><i class="bi bi-plus-circle"></i> Adicionar Novo Vínculo</h6>
    <form id="form-novo-vinculo" onsubmit="adicionarVinculo(event)">
        {% csrf_token %}
        <div class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label">Pessoa</label>
                <div class="input-group">
                    <select name="pessoa" class="form-select select2-pessoa" required>
                        <option value="">Selecione uma pessoa...</option>
                        {% for p in pessoas %}
                        <option value="{{ p.id }}">{{ p.nome }} ({{ p.cpf }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="col-md-1">
                <button type="button" class="btn btn-outline-primary" onclick="abrirModalPessoa()" title="Cadastrar nova pessoa">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
            
            <div class="col-md-5">
                <label class="form-label">Cargo / Função</label>
                <input type="text" name="cargo" class="form-control" placeholder="Ex: Representante Legal" required>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-primary w-100" title="Adicionar vínculo">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
        </div>
    </form>
</div>

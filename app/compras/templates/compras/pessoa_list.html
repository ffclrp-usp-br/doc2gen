{% extends "base.html" %}

{% block title %}Pessoas - Doc2gen{% endblock %}

{% block content %}
<div class="page-header">
    <h3>Pessoas</h3>
    <a href="{% url 'pessoa_create' %}" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Nova Pessoa
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for pessoa in pessoas %}
                    <tr>
                        <td>{{ pessoa.nome }}</td>
                        <td>{{ pessoa.cpf }}</td>
                        <td>
                            <a href="{% url 'pessoa_update' pessoa.id %}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="empty-state">
                            <i class="bi bi-people d-block"></i>
                            <p>Nenhuma pessoa cadastrada.</p>
                            <a href="{% url 'pessoa_create' %}" class="btn btn-primary btn-sm">
                                <i class="bi bi-plus-lg"></i> Cadastrar primeira pessoa
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

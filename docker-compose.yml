version: '3.9'
services:
  db:
    image: mariadb:10.6
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: django_db
      MYSQL_USER: django
      MYSQL_PASSWORD: django
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--ssl=0", "--user=root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "until mysqladmin ping -h db --silent --ssl=0 --user=root --password=root; do echo 'waiting for db'; sleep 2; done; python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/home/python/app
    ports:
      - "8000:8000"
    environment:
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=django_db
      - DB_USER=django
      - DB_PASSWORD=django
      - DB_HOST=db
      - DB_PORT=3306

volumes:
  db_data: